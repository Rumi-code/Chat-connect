<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Flare Chat</title>
    <meta name="description" content="Real-time chat with AI, video calling, and file sharing" />
    <meta name="theme-color" content="#14B8A6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flare" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #flare-loader {
        position: fixed;
        inset: 0;
        background: hsl(224 10% 10%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        gap: 0;
      }
      #flare-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Ambient glow blobs ── */
      .ldr-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        animation: ldr-blob-pulse 6s ease-in-out infinite;
      }
      .ldr-blob-1 {
        width: 500px; height: 500px;
        background: rgba(20,184,166,0.12);
        top: -100px; left: -100px;
        animation-delay: 0s;
      }
      .ldr-blob-2 {
        width: 400px; height: 400px;
        background: rgba(6,182,212,0.1);
        bottom: -80px; right: -80px;
        animation-delay: 3s;
      }
      @keyframes ldr-blob-pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.15); }
      }

      /* ── Logo container ── */
      .ldr-logo-wrap {
        position: relative;
        width: 110px;
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
      }

      /* ── Rotating ring ── */
      .ldr-ring {
        position: absolute;
        inset: -16px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        background: linear-gradient(135deg, rgba(20,184,166,0.6), rgba(6,182,212,0.1), rgba(20,184,166,0.6)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: ldr-ring-spin 3s linear infinite;
      }
      @keyframes ldr-ring-spin {
        to { transform: rotate(360deg); }
      }

      /* ── Bolt SVG glow ── */
      .ldr-bolt {
        animation: ldr-bolt-glow 1.8s ease-in-out infinite;
        border-radius: 30px;
      }
      @keyframes ldr-bolt-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(20,184,166,0.5)) drop-shadow(0 0 30px rgba(20,184,166,0.2)); }
        50%       { filter: drop-shadow(0 0 22px rgba(6,182,212,0.9))  drop-shadow(0 0 60px rgba(6,182,212,0.35)); }
      }

      /* ── Spark particles ── */
      .ldr-spark {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        margin: -2.5px 0 0 -2.5px;
        animation: ldr-spark-shoot 2s ease-out infinite;
      }
      @keyframes ldr-spark-shoot {
        0%   { transform: translate(0, 0) scale(1.4); opacity: 1; }
        60%  { opacity: 0.6; }
        100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
      }

      /* 8 sparks in all directions */
      .s1  { background: #14B8A6; --tx:   0px; --ty: -68px; animation-delay: 0.0s; width:5px; height:5px; }
      .s2  { background: #06B6D4; --tx:  48px; --ty: -48px; animation-delay: 0.25s; width:4px; height:4px; }
      .s3  { background: #14B8A6; --tx:  68px; --ty:   0px; animation-delay: 0.5s; width:5px; height:5px; }
      .s4  { background: #fff;    --tx:  48px; --ty:  48px; animation-delay: 0.75s; width:3px; height:3px; }
      .s5  { background: #06B6D4; --tx:   0px; --ty:  68px; animation-delay: 1.0s; width:4px; height:4px; }
      .s6  { background: #14B8A6; --tx: -48px; --ty:  48px; animation-delay: 1.25s; width:5px; height:5px; }
      .s7  { background: #fff;    --tx: -68px; --ty:   0px; animation-delay: 1.5s; width:3px; height:3px; }
      .s8  { background: #06B6D4; --tx: -48px; --ty: -48px; animation-delay: 1.75s; width:4px; height:4px; }

      /* ── Wordmark ── */
      .ldr-name {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 36px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -1px;
        line-height: 1;
        margin-bottom: 6px;
      }
      .ldr-sub {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 13px;
        color: rgba(255,255,255,0.35);
        letter-spacing: 0.02em;
        margin-bottom: 28px;
      }

      /* ── Bouncing dots ── */
      .ldr-dots { display: flex; gap: 7px; }
      .ldr-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(20,184,166,0.5);
        animation: ldr-dot-bounce 1.3s ease-in-out infinite;
      }
      .ldr-dot:nth-child(2) { animation-delay: 0.18s; }
      .ldr-dot:nth-child(3) { animation-delay: 0.36s; }
      @keyframes ldr-dot-bounce {
        0%, 100% { background: rgba(20,184,166,0.35); transform: translateY(0) scale(1); }
        50%       { background: #14B8A6;               transform: translateY(-5px) scale(1.2); }
      }
    </style>
  </head>
  <body>

    <!-- ── Splash / Loading Screen ── -->
    <div id="flare-loader">
      <div class="ldr-blob ldr-blob-1"></div>
      <div class="ldr-blob ldr-blob-2"></div>

      <div class="ldr-logo-wrap">
        <div class="ldr-ring"></div>

        <!-- Spark particles -->
        <div class="ldr-spark s1"></div>
        <div class="ldr-spark s2"></div>
        <div class="ldr-spark s3"></div>
        <div class="ldr-spark s4"></div>
        <div class="ldr-spark s5"></div>
        <div class="ldr-spark s6"></div>
        <div class="ldr-spark s7"></div>
        <div class="ldr-spark s8"></div>

        <!-- Lightning bolt -->
        <svg class="ldr-bolt" width="110" height="110" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ll-bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#14B8A6"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="ll-bolt" x1="90" y1="20" x2="90" y2="160" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75"/>
            </linearGradient>
          </defs>
          <rect width="180" height="180" rx="44" fill="url(#ll-bg)"/>
          <polygon points="100,22 58,98 86,98 78,158 122,82 94,82" fill="url(#ll-bolt)"/>
        </svg>
      </div>

      <div class="ldr-name">Flare</div>
      <div class="ldr-sub">Loading your workspace…</div>
      <div class="ldr-dots">
        <div class="ldr-dot"></div>
        <div class="ldr-dot"></div>
        <div class="ldr-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // Fade out the loader once React has mounted content
      (function () {
        var loader = document.getElementById('flare-loader');
        var root   = document.getElementById('root');
        if (!loader || !root) return;
        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 600);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
