<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="44" fill="url(#bg)"/>
  <rect width="180" height="180" rx="44" fill="url(#inner)" opacity="0.15"/>
  <!-- N letterform using strokes -->
  <line x1="46" y1="34" x2="46" y2="146" stroke="white" stroke-width="26" stroke-linecap="round"/>
  <line x1="134" y1="34" x2="134" y2="146" stroke="white" stroke-width="26" stroke-linecap="round"/>
  <line x1="46" y1="34" x2="134" y2="146" stroke="white" stroke-width="26" stroke-linecap="round"/>
  <!-- Accent dot at diagonal midpoint -->
  <circle cx="90" cy="90" r="10" fill="white" opacity="0.35" filter="url(#glow)"/>
</svg>
