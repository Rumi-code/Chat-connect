packages:
  "framer-motion": "For fluid, native-feeling micro-animations and page transitions"
  "date-fns": "For formatting timestamps"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod resolver for forms"

images:
  - path: "artifacts/chat-app/public/images/welcome-bg.png"
    description: "Abstract minimal dark space gradient with neon purple and deep blue nebulas, sleek glassmorphism style messaging app background"
    aspect_ratio: "16:9"

notes:
  - Assumes a WebSocket server exists at /ws for WebRTC signaling and real-time invalidations.
  - Using direct fetch for SSE AI streams and file uploads since hooks don't support streams/binary bodies directly.
  - Leveraging standard REST hooks for entity CRUD.
